name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Install Flatpak Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Install KDE Sdk & Platform
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Sdk//6.10 org.kde.Platform//6.10 org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --ccache --require-changes --repo=repo build org.kiosque.Kiosque.json
          flatpak build-bundle repo kiosque.flatpak org.kiosque.Kiosque

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kiosque-Flatpak
          path: kiosque.flatpak

  rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Install Build Dependencies
        run: |
          dnf install -y meson gcc-c++ cargo rust cmake qt6-qtbase-devel qt6-qtdeclarative-devel kf6-kirigami-devel kf6-ki18n-devel dbus-devel rpm-build tar

      - name: Build RPM Package
        run: |
          mkdir -p ~/rpmbuild/SOURCES ~/rpmbuild/SPECS
          cp kiosque.spec ~/rpmbuild/SPECS/
          tar --transform 's,^\.,kiosque-0.1.0,' --exclude=./builddir --exclude=./rust/target --exclude=./.git -czf ~/rpmbuild/SOURCES/kiosque-0.1.0.tar.gz .
          rpmbuild -ba ~/rpmbuild/SPECS/kiosque.spec
          cp ~/rpmbuild/RPMS/x86_64/*.rpm ./

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kiosque-RPM
          path: "*.rpm"

  appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    container:
      image: fedora:44
      options: --device /dev/fuse --privileged
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Install Build Dependencies
        run: |
          dnf install -y meson gcc-c++ cargo rust cmake qt6-qtbase-devel qt6-qtdeclarative-devel kf6-kirigami-devel kf6-ki18n-devel dbus-devel file wget curl file-devel

      - name: Build and Install to AppDir
        run: |
          meson setup builddir --prefix=/usr
          meson compile -C builddir
          DESTDIR=$PWD/AppDir meson install -C builddir

      - name: Download & Extract linuxdeploy
        run: |
          curl -Lo linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
          ./linuxdeploy --appimage-extract
          mv squashfs-root linuxdeploy-extracted

      - name: Download & Extract linuxdeploy-plugin-qt
        run: |
          curl -Lo linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt
          ./linuxdeploy-plugin-qt --appimage-extract
          mv squashfs-root linuxdeploy-plugin-qt-extracted

      - name: Build AppImage Bundle
        env:
          NO_STRIP: "1"
        run: |
          export QMAKE=/usr/lib64/qt6/bin/qmake
          # Combine the extracted AppRuns to package everything correctly
          # We need to make sure the plugins directory is visible to linuxdeploy
          export PATH=$PWD/linuxdeploy-extracted:$PWD/linuxdeploy-plugin-qt-extracted:$PATH

          # 1. Run linuxdeploy to build/assemble the AppDir (without creating the AppImage package yet)
          ./linuxdeploy-extracted/AppRun --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/org.kiosque.Kiosque.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/org.kiosque.Kiosque.svg \
            --plugin qt

          # 2. Clean up base system libraries that shouldn't be bundled and cause SIGSEGV/dynamic loading conflicts
          rm -f AppDir/usr/lib/libudev.so* \
                AppDir/usr/lib/libcbor.so* \
                AppDir/usr/lib/libcrypt.so* \
                AppDir/usr/lib/libcrypto.so* \
                AppDir/usr/lib/libssl.so* \
                AppDir/usr/lib/libsystemd.so* \
                AppDir/usr/lib/libdbus-1.so* \
                AppDir/usr/lib/libselinux.so* \
                AppDir/usr/lib/libmount.so* \
                AppDir/usr/lib/libblkid.so* \
                AppDir/usr/lib/libffi.so* \
                AppDir/usr/lib/libglib-2.0.so* \
                AppDir/usr/lib/libgio-2.0.so* \
                AppDir/usr/lib/libgobject-2.0.so* \
                AppDir/usr/lib/libgmodule-2.0.so*

          # 3. Download and extract appimagetool to pack the AppDir into the final AppImage
          curl -Lo appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun AppDir Kiosque-x86_64.AppImage

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kiosque-AppImage
          path: "*.AppImage"
